<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#0F0C1D"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- Four-pointed star (✦) in gold -->
  <!-- Vertical bar -->
  <rect x="47" y="14" width="6" height="72" rx="3" fill="#C9A84C"/>
  <!-- Horizontal bar -->
  <rect x="14" y="47" width="72" height="6" rx="3" fill="#C9A84C"/>
  <!-- Diagonal / -->
  <line x1="26" y1="74" x2="74" y2="26" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
  <!-- Diagonal \ -->
  <line x1="26" y1="26" x2="74" y2="74" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#0F0C1D"/>
  <circle cx="50" cy="50" r="4" fill="#C9A84C"/>
</svg>
