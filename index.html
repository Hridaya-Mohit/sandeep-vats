<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sandeep Vats — Vedic Astrologer. Kundli Analysis, Vastu Shastra, Numerology & more. Rohini, Delhi.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sandeep Vats | Vedic Astrologer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sandeep Vats | Vedic Astrologer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0F0C1D;
      font-family: 'Georgia', serif;
    }

    #splash {
      position: fixed;
      inset: 0;
      background-color: #0F0C1D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-symbol {
      color: #C9A84C;
      font-size: 28px;
      letter-spacing: 10px;
      margin-bottom: 28px;
      animation: pulse 2s ease-in-out infinite;
    }

    .splash-name {
      color: #F2EDD8;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }

    .splash-name-hi {
      color: #C9A84C;
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 32px;
      opacity: 0.75;
    }

    .splash-divider {
      width: 60px;
      height: 1px;
      background: #C9A84C;
      margin-bottom: 20px;
    }

    .splash-tagline {
      color: #7A6E62;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .splash-loader {
      margin-top: 48px;
      display: flex;
      gap: 8px;
    }

    .splash-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #C9A84C;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-8px); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-symbol">✦ &nbsp; ✦ &nbsp; ✦</div>
    <div class="splash-name">Sandeep Vats</div>
    <div class="splash-name-hi">संदीप वत्स</div>
    <div class="splash-divider"></div>
    <div class="splash-tagline">Vedic Astrologer</div>
    <div class="splash-loader">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      splash.classList.add('hidden');
      setTimeout(function() { splash.remove(); }, 700);
    });
  </script>

</body>
</html>
